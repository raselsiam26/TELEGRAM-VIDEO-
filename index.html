<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Big Video Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 10px;
}

textarea {
    width: 85%;
    height: 100px;
    border-radius: 10px;
    padding: 10px;
    border: none;
    outline: none;
}

button {
    margin-top: 10px;
    padding: 12px 18px;
    border: none;
    border-radius: 10px;
    background: #38bdf8;
    font-weight: bold;
    cursor: pointer;
}

.player {
    margin-top: 20px;
}

video, iframe {
    width: 90%;
    max-width: 800px;
    height: 450px;
    border-radius: 15px;
}

.list {
    margin-top: 20px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
}

.item {
    padding: 10px 15px;
    background: #1e293b;
    border-radius: 10px;
    cursor: pointer;
}

.item:hover {
    background: #38bdf8;
    color: black;
}
</style>
</head>

<body>

<h1>🎬 Big Video Player</h1>

<p>প্রতি লাইনে ১টা ভিডিও লিংক দাও</p>

<textarea id="links"></textarea><br>
<button onclick="loadList()">Load Videos</button>

<div class="player" id="player"></div>

<div class="list" id="list"></div>

<script>
let videos = [];

function loadList() {
    let input = document.getElementById("links").value;
    videos = input.split("\n").map(v => v.trim()).filter(v => v);

    let listDiv = document.getElementById("list");
    listDiv.innerHTML = "";

    videos.forEach((url, index) => {
        listDiv.innerHTML += `
            <div class="item" onclick="playVideo(${index})">
                Video ${index + 1}
            </div>
        `;
    });

    if(videos.length > 0) {
        playVideo(0);
    }
}

function playVideo(index) {
    let url = videos[index];
    let player = document.getElementById("player");

    if(url.includes(".mp4")) {
        player.innerHTML = `
            <video controls autoplay>
                <source src="${url}" type="video/mp4">
            </video>
        `;
    } else {
        player.innerHTML = `
            <iframe src="${url}" allowfullscreen></iframe>
        `;
    }
}
</script>

</body>
</html>
